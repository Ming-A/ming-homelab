    {
        "__inputs": [
            {
                "name": "DS_PROMETHEUS",
                "label": "prometheus",
                "description": "",
                "type": "datasource",
                "pluginId": "prometheus",
                "pluginName": "Prometheus"
            }
        ],
        "__requires": [
            {
                "type": "datasource",
                "id": "prometheus",
                "name": "Prometheus",
                "version": "1.0.0"
            }
        ],
        "uid": "homelab-node-overview",
        "title": "Homelab Node Overview",
        "tags": [
            "homelab",
            "nodes"
        ],
        "timezone": "browser",
        "schemaVersion": 38,
        "version": 1,
        "refresh": "30s",
        "time": {
            "from": "now-3h",
            "to": "now"
        },
        "panels": [
            {
                "id": 1,
                "type": "row",
                "title": "CPU Usage",
                "gridPos": {
                    "x": 0,
                    "y": 0,
                    "w": 24,
                    "h": 1
                },
                "collapsed": false
            },
            {
                "id": 2,
                "type": "stat",
                "title": "node1 CPU",
                "gridPos": {
                    "x": 0,
                    "y": 1,
                    "w": 8,
                    "h": 4
                },
                "fieldConfig": {
                    "defaults": {
                        "unit": "percent",
                        "thresholds": {
                            "mode": "absolute",
                            "steps": [
                                {
                                    "color": "green",
                                    "value": null
                                },
                                {
                                    "color": "orange",
                                    "value": 70
                                },
                                {
                                    "color": "red",
                                    "value": 90
                                }
                            ]
                        },
                        "color": {
                            "mode": "thresholds"
                        },
                        "mappings": []
                    }
                },
                "options": {
                    "reduceOptions": {
                        "calcs": [
                            "lastNotNull"
                        ]
                    },
                    "colorMode": "background",
                    "graphMode": "area",
                    "justifyMode": "auto",
                    "textMode": "auto"
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "${DS_PROMETHEUS}"
                },
                "targets": [
                    {
                        "expr": "(1 - avg(rate(node_cpu_seconds_total{mode=\"idle\",instance=\"10.69.40.21:9100\"}[5m]))) * 100",
                        "instant": true,
                        "legendFormat": "{{instance}}",
                        "datasource": {
                            "type": "prometheus",
                            "uid": "${DS_PROMETHEUS}"
                        }
                    }
                ]
            },
