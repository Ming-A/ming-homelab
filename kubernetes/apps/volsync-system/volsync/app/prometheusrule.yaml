---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: volsync
spec:
  groups:
    - name: volsync.rules
      rules:
        - alert: VolSyncComponentAbsent
          expr: |-
            absent(up{job="volsync-metrics"})
          annotations:
            summary: >-
              VolSync component has disappeared from Prometheus target discovery
          for: 5m
          labels:
            severity: critical

        - alert: VolSyncVolumeOutOfSync
          expr: |-
            volsync_volume_out_of_sync == 1
          annotations:
            summary: >-
              {{ $labels.obj_namespace }}/{{ $labels.obj_name }} volume is out of sync
          for: 5m
          labels:
            severity: critical

        - alert: VolSyncBackupsMissed
          expr: |-
            increase(volsync_missed_intervals_total[2h]) > 1
          annotations:
            summary: >-
              {{ $labels.obj_namespace }}/{{ $labels.obj_name }} has missed scheduled backups (mover failing to run)
          for: 30m
          labels:
            severity: critical

        - alert: VolSyncRepositoryUnreachable
          expr: |-
            volsync_kopia_repository_connectivity == 0
          annotations:
            summary: >-
              {{ $labels.obj_namespace }}/{{ $labels.obj_name }} cannot reach its kopia backup repository
          for: 15m
          labels:
            severity: critical
