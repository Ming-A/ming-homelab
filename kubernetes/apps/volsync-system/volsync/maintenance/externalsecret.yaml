---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: volsync-maintenance
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: volsync-maintenance-secret
  data:
    - secretKey: KOPIA_PASSWORD
      remoteRef:
        key: secret/volsync
        property: KOPIA_PASSWORD
    - secretKey: KOPIA_FS_PATH
      remoteRef:
        key: secret/volsync
        property: KOPIA_FS_PATH
    - secretKey: KOPIA_REPOSITORY
      remoteRef:
        key: secret/volsync
        property: KOPIA_REPOSITORY
