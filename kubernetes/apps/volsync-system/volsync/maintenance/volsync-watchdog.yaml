---
# Watchdog that detects and self-heals stuck VolSync ReplicationSource jobs.
# A job is considered stuck if lastSyncTime is >2h old (schedule is hourly).
# Fix: delete the stale job so VolSync controller creates a fresh one.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: volsync-watchdog
  namespace: volsync-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: volsync-watchdog
rules:
  - apiGroups: ["volsync.backube"]
    resources: ["replicationsources"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: volsync-watchdog
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: volsync-watchdog
subjects:
  - kind: ServiceAccount
    name: volsync-watchdog
    namespace: volsync-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: volsync-watchdog
  namespace: volsync-system
spec:
  schedule: "45 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          serviceAccountName: volsync-watchdog
          restartPolicy: OnFailure
          containers:
            - name: watchdog
              image: bitnami/kubectl:latest
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  STALE_THRESHOLD=7200   # 2 hours in seconds
                  NOW=$(date +%s)
                  FOUND_STUCK=0

                  echo "=== VolSync watchdog starting at $(date -u) ==="

                  # Get all ReplicationSources across all namespaces
                  while IFS= read -r line; do
                    NS=$(echo "$line" | awk '{print $1}')
                    NAME=$(echo "$line" | awk '{print $2}')
                    LAST_SYNC=$(echo "$line" | awk '{print $3}')

                    if [[ "$LAST_SYNC" == "<none>" || -z "$LAST_SYNC" ]]; then
                      echo "SKIP $NS/$NAME: no lastSyncTime yet"
                      continue
                    fi

                    LAST_SYNC_TS=$(date -d "$LAST_SYNC" +%s 2>/dev/null || echo 0)
                    AGE=$(( NOW - LAST_SYNC_TS ))

                    if (( AGE > STALE_THRESHOLD )); then
                      JOB="volsync-src-${NAME}"
                      echo "STUCK: $NS/$NAME last synced ${AGE}s ago ($(( AGE / 3600 ))h $(( (AGE % 3600) / 60 ))m) — deleting job $JOB"
                      kubectl delete job "$JOB" -n "$NS" --ignore-not-found=true
                      FOUND_STUCK=$(( FOUND_STUCK + 1 ))
                    else
                      echo "OK:    $NS/$NAME last synced ${AGE}s ago"
                    fi
                  done < <(kubectl get replicationsource -A \
                    -o custom-columns='NS:.metadata.namespace,NAME:.metadata.name,LAST:.status.lastSyncTime' \
                    --no-headers)

                  echo "=== Done. Stuck jobs cleared: $FOUND_STUCK ==="
