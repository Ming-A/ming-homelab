apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  chartRef:
    kind: OCIRepository
    name: authentik
  interval: 1h
  values:
    global:
      env:
        - name: AUTHENTIK_SECRET_KEY
          value: "${AUTHENTIK_SECRET_KEY}"
        - name: AUTHENTIK_BOOTSTRAP_PASSWORD
          value: "${AUTHENTIK_BOOTSTRAP_PASSWORD}"
        - name: AUTHENTIK_BOOTSTRAP_TOKEN
          value: "${AUTHENTIK_BOOTSTRAP_TOKEN}"
        - name: AUTHENTIK_BOOTSTRAP_EMAIL
          value: "${AUTHENTIK_BOOTSTRAP_EMAIL}"

    authentik:
      postgresql:
        password: "${AUTHENTIK_POSTGRESQL__PASSWORD}"

    server:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: 1000m
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true

    worker:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true

    postgresql:
      enabled: true
      auth:
        password: "${AUTHENTIK_POSTGRESQL__PASSWORD}"
      primary:
        persistence:
          enabled: true
          size: 4Gi
          storageClass: ceph-block
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m

    redis:
      enabled: true
      master:
        persistence:
          enabled: true
          size: 1Gi
          storageClass: ceph-block
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 250m
