---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frigate-configmap
data:
  config.yml: |
    mqtt:
      enabled: true
      host: 10.69.40.4
      port: 1883
      user: "{FRIGATE_MQTT_USER}"
      password: "{FRIGATE_MQTT_PASSWORD}"

    detectors:
      coral:
        type: edgetpu
        device: usb

    lpr:
      enabled: true
      device: CPU
      model_size: small
      min_area: 500
      detection_threshold: 0.5
      recognition_threshold: 0.8
      min_plate_length: 2
      format: "^[A-Z]{1,3} ?[0-9]{1,4} ?[A-Z]{0,2}$"

    go2rtc:
      streams:
        carport-front:
          - "{FRIGATE_RTSP_CARPORT_FRONT}"
        garden:
          - "{FRIGATE_RTSP_GARDEN}"
        left:
          - "{FRIGATE_RTSP_LEFT}"
        right:
          - "{FRIGATE_RTSP_RIGHT}"
        back:
          - "{FRIGATE_RTSP_BACK}"
        foyer:
          - "{FRIGATE_RTSP_FOYER}"
        kitchen:
          - "{FRIGATE_RTSP_KITCHEN}"

    ffmpeg:
      hwaccel_args: []

    cameras:
      carport-front:
        lpr:
          enabled: true
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/carport-front
              input_args: preset-rtsp-restream
              roles:
                - detect
                - record
        detect:
          width: 1280
          height: 720
          fps: 5
          max_disappeared: 50
          stationary:
            interval: 50
            threshold: 50
        motion:
          threshold: 22
          contour_area: 8
        objects:
          track:
            - car
            - motorcycle
            - person
          filters:
            car:
              min_score: 0.5
              threshold: 0.5
            motorcycle:
              min_score: 0.4
              threshold: 0.55
        zones:
          porch_entry:
            coordinates: 0.40,0.13, 0.82,0.15, 0.84,0.40, 0.40,0.36
            loitering_time: 0
            inertia: 3
            objects:
              - car
              - motorcycle
      garden:
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/garden
              input_args: preset-rtsp-restream
              roles:
                - detect
                - record
        detect:
          width: 1280
          height: 720
          fps: 5
      left:
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/left
              input_args: preset-rtsp-restream
              roles:
                - detect
                - record
        detect:
          width: 1280
          height: 720
          fps: 5
      right:
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/right
              input_args: preset-rtsp-restream
              roles:
                - detect
                - record
        detect:
          width: 1280
          height: 720
          fps: 5
      back:
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/back
              input_args: preset-rtsp-restream
              roles:
                - detect
                - record
        detect:
          width: 1280
          height: 720
          fps: 5
      foyer:
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/foyer
              input_args: preset-rtsp-restream
              roles:
                - detect
                - record
        detect:
          width: 1280
          height: 720
          fps: 5
      kitchen:
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/kitchen
              input_args: preset-rtsp-restream
              roles:
                - detect
                - record
        detect:
          width: 1280
          height: 720
          fps: 5

    record:
      enabled: true
      continuous:
        days: 9

    snapshots:
      enabled: true
      retain:
        default: 14
