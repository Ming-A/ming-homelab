---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frigate-configmap
data:
  config.yml: |
    mqtt:
      enabled: true
      host: 10.69.40.4
      port: 1883
      user: "{FRIGATE_MQTT_USER}"
      password: "{FRIGATE_MQTT_PASSWORD}"

    detectors:
      coral:
        type: edgetpu
        device: usb

    lpr:
      enabled: true
      device: CPU
      model_size: large
      min_area: 100
      detection_threshold: 0.4
      recognition_threshold: 0.5
      min_plate_length: 2
      enhancement: 8
      format: "^[A-Z]{1,3} ?[0-9]{1,4} ?[A-Z]{0,2}$"
      debug_save_plates: true

    go2rtc:
      streams:
        carport-front:
          - "{FRIGATE_RTSP_CARPORT_FRONT}"
        garden:
          - "{FRIGATE_RTSP_GARDEN}"
        left:
          - "{FRIGATE_RTSP_LEFT}"
        right:
          - "{FRIGATE_RTSP_RIGHT}"
        back:
          - "{FRIGATE_RTSP_BACK}"
        foyer:
          - "{FRIGATE_RTSP_FOYER}"
        kitchen:
          - "{FRIGATE_RTSP_KITCHEN}"
        doorbell:
          - "{FRIGATE_RTSP_DOORBELL}"

    ffmpeg:
      hwaccel_args: []

    objects:
      track:
        - cat
        - person
      filters:
        cat:
          min_score: 0.5
          threshold: 0.7
          min_area: 100
          max_area: 45000
        person:
          min_score: 0.5
          threshold: 0.7

    cameras:
      carport-front:
        lpr:
          enabled: true
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/carport-front
              input_args: preset-rtsp-restream
              roles:
                - detect
                - record
        detect:
          width: 1280
          height: 720
          fps: 10
          max_disappeared: 50
          stationary:
            interval: 50
            threshold: 50
        objects:
          track:
            - car
            - motorcycle
            - person
            - cat
          filters:
            car:
              min_score: 0.6
              threshold: 0.7
            motorcycle:
              min_score: 0.4
              threshold: 0.55
            person:
              min_score: 0.6
              threshold: 0.75
        zones:
          porch_entry:
            coordinates: 0.42,0.30, 0.86,0.32, 0.88,0.80, 0.40,0.78
            loitering_time: 0
            inertia: 3
            objects:
              - car
              - motorcycle
              - person
      garden:
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/garden
              input_args: preset-rtsp-restream
              roles:
                - detect
                - record
        detect:
          width: 1280
          height: 720
          fps: 5
      left:
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/left
              input_args: preset-rtsp-restream
              roles:
                - detect
                - record
        detect:
          width: 1280
          height: 720
          fps: 5
      right:
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/right
              input_args: preset-rtsp-restream
              roles:
                - detect
                - record
        detect:
          width: 1280
          height: 720
          fps: 5
      back:
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/back
              input_args: preset-rtsp-restream
              roles:
                - detect
                - record
        detect:
          width: 1280
          height: 720
          fps: 5
        objects:
          filters:
            person:
              min_area: 1500
              mask:
                - 0.08,0.08,0.22,0.08,0.22,0.44,0.08,0.44
      foyer:
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/foyer
              input_args: preset-rtsp-restream
              roles:
                - detect
                - record
        detect:
          width: 1280
          height: 720
          fps: 5
      kitchen:
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/kitchen
              input_args: preset-rtsp-restream
              roles:
                - detect
                - record
        detect:
          width: 1280
          height: 720
          fps: 5
      doorbell:
        lpr:
          enabled: true
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/doorbell
              input_args: preset-rtsp-restream
              roles:
                - detect
                - record
        detect:
          width: 2560
          height: 1920
          fps: 5
        objects:
          track:
            - cat
            - dog
            - car
            - motorcycle
            - person
          filters:
            car:
              min_score: 0.6
              threshold: 0.7
              mask:
                - 0.0,0.40,0.19,0.40,0.19,0.82,0.0,0.82
                - 0.78,0.40,1.0,0.40,1.0,0.66,0.78,0.66
            motorcycle:
              min_score: 0.4
              threshold: 0.55
            person:
              min_score: 0.5
              threshold: 0.7
              min_area: 4000
              mask:
                - 0.70,0.36,0.82,0.36,0.82,0.53,0.70,0.53
            license_plate:
              mask:
                - 0.0,0.40,0.19,0.40,0.19,0.82,0.0,0.82
                - 0.78,0.40,1.0,0.40,1.0,0.66,0.78,0.66
            cat:
              min_score: 0.5
              threshold: 0.7
              min_area: 100
              max_area: 45000
            dog:
              min_score: 0.5
              threshold: 0.7
              min_area: 100
              max_area: 45000
        zones:
          gate_approach:
            coordinates: 0.03,0.96, 0.12,0.81, 0.24,0.77, 0.40,0.74, 0.55,0.72, 0.72,0.68, 0.87,0.64, 1.0,0.69, 1.0,1.0, 0.02,1.0
            loitering_time: 0
            inertia: 3
            objects:
              - person
              - car
              - motorcycle

    record:
      enabled: true
      continuous:
        days: 9

    snapshots:
      enabled: true
      retain:
        default: 14
