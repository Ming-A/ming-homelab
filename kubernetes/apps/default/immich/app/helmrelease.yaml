---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  chartRef:
    kind: OCIRepository
    name: immich
  interval: 1h
  dependsOn:
    - name: immich-postgres
  values:
    # Top-level controllers = server component (shared env vars)
    controllers:
      main:
        containers:
          main:
            env:
              TZ: Asia/Kuala_Lumpur
              DB_HOSTNAME: immich-postgres
              DB_PORT: "${DB_PORT}"
              DB_USERNAME: "${DB_USERNAME}"
              DB_DATABASE_NAME: "${DB_DATABASE_NAME}"
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-secret
                    key: DB_PASSWORD

    immich:
      persistence:
        library:
          existingClaim: immich-library

    # Archive external library mount (on the server pod)
    persistence:
      archive:
        existingClaim: immich-archive
        globalMounts:
          - path: /mnt/archive_media
            readOnly: true

    # Enable built-in valkey (Redis-compatible cache)
    # REDIS_HOSTNAME defaults to "immich-valkey" matching this service
    valkey:
      enabled: true
      persistence:
        data:
          type: emptyDir

    server:
      enabled: true
      resources:
        requests:
          cpu: 500m
        limits:
          cpu: 5000m

    machine-learning:
      enabled: true
      resources:
        requests:
          cpu: 200m
        limits:
          cpu: 3000m
      persistence:
        cache:
          enabled: true
          size: 10Gi
          storageClass: ceph-block
