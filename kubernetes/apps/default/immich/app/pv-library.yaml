---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-library
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - nfsvers=4.1
  nfs:
    server: ${NFS_SERVER}
    path: ${NFS_PATH_LIBRARY}
  claimRef:
    name: immich-library
    namespace: default
