---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: homepage
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: homepage-secret
  data:
    - secretKey: HOMEPAGE_VAR_SYNOLOGY_URL
      remoteRef:
        key: secret/homepage
        property: HOMEPAGE_VAR_SYNOLOGY_URL
    - secretKey: HOMEPAGE_VAR_SYNOLOGY_USERNAME
      remoteRef:
        key: secret/homepage
        property: HOMEPAGE_VAR_SYNOLOGY_USERNAME
    - secretKey: HOMEPAGE_VAR_SYNOLOGY_PASSWORD
      remoteRef:
        key: secret/homepage
        property: HOMEPAGE_VAR_SYNOLOGY_PASSWORD
    - secretKey: HOMEPAGE_VAR_SPEEDTEST_URL
      remoteRef:
        key: secret/homepage
        property: HOMEPAGE_VAR_SPEEDTEST_URL
    - secretKey: HOMEPAGE_VAR_SONARR_KEY
      remoteRef:
        key: secret/homepage
        property: HOMEPAGE_VAR_SONARR_KEY
    - secretKey: HOMEPAGE_VAR_RADARR_KEY
      remoteRef:
        key: secret/homepage
        property: HOMEPAGE_VAR_RADARR_KEY
    - secretKey: HOMEPAGE_VAR_PROWLARR_KEY
      remoteRef:
        key: secret/homepage
        property: HOMEPAGE_VAR_PROWLARR_KEY
    - secretKey: HOMEPAGE_VAR_QBITTORRENT_USERNAME
      remoteRef:
        key: secret/homepage
        property: HOMEPAGE_VAR_QBITTORRENT_USERNAME
    - secretKey: HOMEPAGE_VAR_QBITTORRENT_PASSWORD
      remoteRef:
        key: secret/homepage
        property: HOMEPAGE_VAR_QBITTORRENT_PASSWORD
    - secretKey: HOMEPAGE_VAR_PIHOLE_URL
      remoteRef:
        key: secret/homepage
        property: HOMEPAGE_VAR_PIHOLE_URL
    - secretKey: HOMEPAGE_VAR_PIHOLE_KEY
      remoteRef:
        key: secret/homepage
        property: HOMEPAGE_VAR_PIHOLE_KEY
    - secretKey: HOMEPAGE_VAR_UNIFI_URL
      remoteRef:
        key: secret/homepage
        property: HOMEPAGE_VAR_UNIFI_URL
    - secretKey: HOMEPAGE_VAR_UNIFI_USERNAME
      remoteRef:
        key: secret/homepage
        property: HOMEPAGE_VAR_UNIFI_USERNAME
    - secretKey: HOMEPAGE_VAR_UNIFI_PASSWORD
      remoteRef:
        key: secret/homepage
        property: HOMEPAGE_VAR_UNIFI_PASSWORD
    - secretKey: HOMEPAGE_VAR_IMMICH_KEY
      remoteRef:
        key: secret/homepage
        property: HOMEPAGE_VAR_IMMICH_KEY
