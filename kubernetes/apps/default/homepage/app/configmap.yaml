---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: default
data:
  settings.yaml: |
    title: Ming's Homelab
    favicon: https://kubernetes.io/images/favicon.png
    theme: dark
    color: slate
    headerStyle: clean
    layout:
      Media:
        icon: mdi-play-circle
        style: row
        columns: 5
      Downloads:
        icon: mdi-download
        style: row
        columns: 3
      Smart Home:
        icon: mdi-home-automation
        style: row
        columns: 2
      Network:
        icon: mdi-router-network
        style: row
        columns: 2
      Infrastructure:
        icon: mdi-server
        style: row
        columns: 6

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "ming-homelab"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - datetime:
        text_size: xl
        format:
          dateStyle: long
          timeStyle: short
          hour12: true

  services.yaml: |
    - Media:
        - Jellyfin:
            icon: jellyfin.png
            href: https://jellyfin.mingsoonang.com
            description: Media server
            siteMonitor: https://jellyfin.mingsoonang.com/health
        - Sonarr:
            icon: sonarr.png
            href: https://sonarr.mingsoonang.com
            description: TV show automation
            widget:
              type: sonarr
              url: http://sonarr.default.svc.cluster.local
              key: "{{HOMEPAGE_VAR_SONARR_KEY}}"
        - Radarr:
            icon: radarr.png
            href: https://radarr.mingsoonang.com
            description: Movie automation
            widget:
              type: radarr
              url: http://radarr.default.svc.cluster.local:80
              key: "{{HOMEPAGE_VAR_RADARR_KEY}}"
        - Seerr:
            icon: overseerr.png
            href: https://seerr.mingsoonang.com
            description: Media requests
            siteMonitor: https://seerr.mingsoonang.com/api/v1/status
        - Immich:
            icon: immich.png
            href: https://immich.mingsoonang.com
            description: Photo management
            siteMonitor: https://immich.mingsoonang.com/api/server/ping
            widget:
              type: immich
              url: http://immich-server.default.svc.cluster.local:2283
              key: "{{HOMEPAGE_VAR_IMMICH_KEY}}"
              version: 2

    - Downloads:
        - qBittorrent:
            icon: qbittorrent.png
            href: https://qbittorrent.mingsoonang.com
            description: Torrent client
            widget:
              type: qbittorrent
              url: http://qbittorrent-app.default.svc.cluster.local:8080
              username: "{{HOMEPAGE_VAR_QBITTORRENT_USERNAME}}"
              password: "{{HOMEPAGE_VAR_QBITTORRENT_PASSWORD}}"
        - Prowlarr:
            icon: prowlarr.png
            href: https://prowlarr.mingsoonang.com
            description: Indexer manager
            widget:
              type: prowlarr
              url: http://prowlarr.default.svc.cluster.local:9696
              key: "{{HOMEPAGE_VAR_PROWLARR_KEY}}"
        - Byparr:
            icon: mdi-shield-check
            href: https://byparr.mingsoonang.com
            description: Cloudflare bypass proxy
            siteMonitor: https://byparr.mingsoonang.com

    - Smart Home:
        - Home Assistant:
            icon: home-assistant.png
            href: https://homeassistant.mingsoonang.com
            description: Home automation
            siteMonitor: https://homeassistant.mingsoonang.com/api/
        - Frigate:
            icon: frigate.png
            href: https://frigate.mingsoonang.com
            description: NVR — 7 cameras
            siteMonitor: https://frigate.mingsoonang.com/api/version

    - Network:
        - Pi-hole:
            icon: pi-hole.png
            href: "{{HOMEPAGE_VAR_PIHOLE_URL}}"
            description: DNS ad blocker
            widget:
              type: pihole
              url: "{{HOMEPAGE_VAR_PIHOLE_URL}}"
              version: 6
              key: "{{HOMEPAGE_VAR_PIHOLE_KEY}}"
        - Unifi:
            icon: unifi.png
            href: "{{HOMEPAGE_VAR_UNIFI_URL}}"
            description: Network controller
            widget:
              type: unifi
              url: "{{HOMEPAGE_VAR_UNIFI_URL}}"
              username: "{{HOMEPAGE_VAR_UNIFI_USERNAME}}"
              password: "{{HOMEPAGE_VAR_UNIFI_PASSWORD}}"

    - Infrastructure:
        - Synology:
            icon: synology.png
            href: "{{HOMEPAGE_VAR_SYNOLOGY_URL}}"
            description: NAS storage
            widget:
              type: diskstation
              url: "{{HOMEPAGE_VAR_SYNOLOGY_URL}}"
              username: "{{HOMEPAGE_VAR_SYNOLOGY_USERNAME}}"
              password: "{{HOMEPAGE_VAR_SYNOLOGY_PASSWORD}}"
              volume: volume_1
        - Speedtest:
            icon: speedtest-tracker.png
            href: https://speedtest.mingsoonang.com
            description: Internet speed tests
            widget:
              type: speedtest
              url: "{{HOMEPAGE_VAR_SPEEDTEST_URL}}"
              bitratePrecision: 2
        - Grafana:
            icon: grafana.png
            href: https://grafana.mingsoonang.com
            description: Dashboards & monitoring
            siteMonitor: https://grafana.mingsoonang.com/api/health
        - Prometheus:
            icon: prometheus.png
            href: https://prometheus.mingsoonang.com
            description: Metrics
            siteMonitor: https://prometheus.mingsoonang.com/-/healthy
        - Rook Ceph:
            icon: ceph.png
            href: https://rook.mingsoonang.com
            description: Distributed storage
            siteMonitor: https://rook.mingsoonang.com
        - Kopia:
            icon: mdi-backup-restore
            href: https://kopia.mingsoonang.com
            description: Backup repository
            siteMonitor: https://kopia.mingsoonang.com
        - OpenBao:
            icon: mdi-key-chain
            href: https://vault.mingsoonang.com
            description: Secrets management
            siteMonitor: https://vault.mingsoonang.com/v1/sys/health

  bookmarks.yaml: |
    - Quick Links:
        - GitHub Repo:
            - icon: github.png
              href: https://github.com/Ming-A/ming-homelab

  kubernetes.yaml: |
    mode: cluster

